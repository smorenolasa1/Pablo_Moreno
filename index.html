<!doctype html>

    <title>Marcos Arroyo Navarro | Arroyo Systems</title>

    <meta property="og:type" content="website" />

  <body>
    <main class="page-shell" aria-label="Digital business card">
      <div class="ambient ambient-one" aria-hidden="true"></div>
      <div class="ambient ambient-two" aria-hidden="true"></div>
      <section class="business-card" id="businessCard" aria-labelledby="personName">
        <div class="card-pattern" aria-hidden="true"></div>

        <header class="card-header">
          <img class="brand-logo" src="assets/arroyo-systems-logo-transparent.png" alt="Arroyo Systems" />
          <div class="metal-line" aria-hidden="true"></div>
        </header>

        <div class="identity">
          <p class="eyebrow" id="locationText">Madrid, Spain</p>
          <h1 id="personName">Marcos Arroyo Navarro</h1>
          <p class="role" id="roleText">Founder | Chief Engineer</p>
          <p class="tagline" id="taglineText">Engineering for Machined Components</p>
        </div>

        <nav class="actions" aria-label="Contact actions">
          <a class="action action-primary" id="saveContact" href="assets/marcos-arroyo-navarro.vcf" download aria-label="Save Marcos Arroyo Navarro contact">
            <span class="icon" aria-hidden="true">

            </span>
            <span>Guardar contacto</span>
          </a>

          <div class="quick-actions">
            <a class="action" id="phoneLink" href="tel:+34691018974" aria-label="Call Marcos Arroyo Navarro">
              <span class="icon" aria-hidden="true">
                <svg viewBox="0 0 24 24"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.5 19.5 0 0 1-6-6A19.8 19.8 0 0 1 2.1 4.2 2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1 1 .4 2 .7 2.8a2 2 0 0 1-.4 2.1L8.1 9.9a16 16 0 0 0 6 6l1.3-1.3a2 2 0 0 1 2.1-.4c.9.3 1.8.6 2.8.7A2 2 0 0 1 22 16.9z" /></svg>
              </span>
              <span>Llamar</span>
            </a>
            <a class="action" id="emailLink" href="mailto:marcos@arroyo-systems.com" aria-label="Email Marcos Arroyo Navarro">
              <span class="icon" aria-hidden="true">
                <svg viewBox="0 0 24 24"><path d="M4 4h16a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z" /><path d="m22 6-10 7L2 6" /></svg>
              </span>
              <span>Email</span>
            </a>
            <a class="action" id="linkedinLink" href="https://www.linkedin.com/in/marcos-arroyo-navarro/" target="_blank" rel="noopener noreferrer" aria-label="Open LinkedIn profile">
              <span class="icon" aria-hidden="true">
                <svg viewBox="0 0 24 24"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-4 0v7h-4v-7a6 6 0 0 1 6-6z" /><path d="M2 9h4v12H2z" /><path d="M4 6a2 2 0 1 0 0-4 2 2 0 0 0 0 4z" /></svg>
              </span>
              <span>LinkedIn</span>
            </a>
            <a class="action" id="websiteLink" href="https://www.arroyo-systems.com" target="_blank" rel="noopener noreferrer" aria-label="Visit Arroyo Systems website">
              <span class="icon" aria-hidden="true">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" /><path d="M2 12h20" /><path d="M12 2a15.3 15.3 0 0 1 0 20" /><path d="M12 2a15.3 15.3 0 0 0 0 20" /></svg>
              </span>
              <span>Web</span>
            </a>
          </div>
        </nav>

        <button class="share-button" id="shareButton" type="button" aria-label="Share this digital card" hidden>
          <span class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3" /><circle cx="6" cy="12" r="3" /><circle cx="18" cy="19" r="3" /><path d="m8.6 13.5 6.8 4" /><path d="m15.4 6.5-6.8 4" /></svg>

        <p class="tap-note">Tap to connect</p>

    <script src="script.js" defer></script>
